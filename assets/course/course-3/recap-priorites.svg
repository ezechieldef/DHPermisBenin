    <g transform="translate(90 520)"><rect x="15" y="0" width="150" height="285" rx="25" fill="#17232d"/><circle cx="90" cy="65" r="39" fill="#4b555d"/><circle cx="90" cy="143" r="39" fill="#f4d83f"/><circle cx="90" cy="221" r="39" fill="#4b555d"/><text x="340" y="105" font-size="22" font-weight="700">Jaune clignotant</text><text x="340" y="142" font-size="20">ou intersection</text><text x="340" y="174" font-size="20">sans signalisation</text><path d="M235 230v120h95" fill="none" stroke="#e2a400" stroke-width="18"/><path d="M400 230v120h-95" fill="none" stroke="#9aa8b5" stroke-width="10"/></g>

